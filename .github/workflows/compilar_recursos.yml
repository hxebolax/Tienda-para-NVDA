# Workflow de GitHub Actions para compilar y publicar traducciones
# y documentación de complementos NVDA.
#
# Se ejecuta cuando se modifican archivos en addon/locale/ o addon/doc/.
# Compila los .po a .mo, genera manifest.ini traducidos por idioma,
# convierte .md a .html y empaqueta todo en un ZIP publicado como
# release especial, separada de las releases del complemento.
#
# Para reutilizar en otro complemento:
# 1. Copiar este archivo a .github/workflows/ en tu repositorio.
# 2. Ajustar las variables en la sección "env" de abajo.
#
# Licencia: GPL v2

name: Compilar y Publicar Recursos

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'addon/locale/**'
      - 'addon/doc/**'
  workflow_dispatch:

# ══════════════════════════════════════════════════════════════
# CONFIGURACIÓN DEL DESARROLLADOR
# Ajusta estas variables para tu complemento.
# ══════════════════════════════════════════════════════════════
env:
  # Nombre del complemento (debe coincidir con manifest.ini)
  NOMBRE_COMPLEMENTO: "TiendaNVDA"
  # Tag de la release de recursos (debe coincidir con el parámetro
  # tag_release del ActualizadorRecursos en tu código Python)
  TAG_RELEASE: "recursos-latest"
  # Qué incluir en el paquete (true/false)
  INCLUIR_IDIOMAS: "true"
  INCLUIR_DOCUMENTACION: "true"
  # Generar manifest.ini traducidos por idioma (requiere buildVars.py
  # y manifest-translated.ini.tpl en la raíz del repositorio)
  GENERAR_MANIFEST: "true"
  # Generar HTML desde archivos Markdown de documentación
  GENERAR_HTML: "true"
  # Extensiones de documentación a incluir (separadas por espacio)
  EXTENSIONES_DOC: ".html .md .txt .css"

permissions:
  contents: write

jobs:
  compilar-y-publicar:
    name: Compilar recursos y publicar
    runs-on: ubuntu-latest

    steps:
      - name: Obtener código fuente
        uses: actions/checkout@v6

      - name: Instalar dependencias
        run: |
          sudo apt-get update && sudo apt-get install -y gettext
          pip install markdown

      - name: Compilar archivos .po a .mo
        if: env.INCLUIR_IDIOMAS == 'true'
        run: |
          echo "=== Compilando traducciones ==="
          ERRORES=0
          COMPILADOS=0

          for po in $(find addon/locale -name "*.po" -type f); do
            dir=$(dirname "$po")
            base=$(basename "$po" .po)
            mo="${dir}/${base}.mo"

            echo "Compilando: ${po}"
            if msgfmt -o "$mo" "$po" 2>&1; then
              COMPILADOS=$((COMPILADOS + 1))
              echo "  ✓ OK"
            else
              ERRORES=$((ERRORES + 1))
              echo "  ✗ Error"
            fi
          done

          echo ""
          echo "Compilados: ${COMPILADOS}, Errores: ${ERRORES}"

          if [ $ERRORES -gt 0 ]; then
            echo "::warning::${ERRORES} errores de compilación"
          fi

      - name: Generar manifest.ini traducidos
        if: env.INCLUIR_IDIOMAS == 'true' && env.GENERAR_MANIFEST == 'true'
        run: |
          python3 << 'PYEOF'
          import gettext, codecs, os, sys, types

          # ── Mock de SCons para poder importar buildVars.py ──
          for mod in ['SCons', 'SCons.Script', 'SCons.Node', 'SCons.Node.FS']:
              sys.modules[mod] = types.ModuleType(mod)
          m = sys.modules['SCons.Script']
          for attr in ['EnsurePythonVersion','Variables','BoolVariable','Environment','Copy','Builder']:
              setattr(m, attr, lambda *a, **kw: None)

          sys.path.insert(0, '.')
          import buildVars

          plantilla = "manifest-translated.ini.tpl"
          if not os.path.exists(plantilla):
              print(f"⚠ No se encontró {plantilla}, omitiendo manifest.ini")
              sys.exit(0)

          with open(plantilla, "r", encoding="utf-8") as f:
              tpl = f.read()

          addon_info = buildVars.addon_info
          generados = 0
          errores = 0

          for lang in sorted(os.listdir("addon/locale")):
              lang_path = os.path.join("addon/locale", lang)
              if not os.path.isdir(lang_path):
                  continue
              mo_path = os.path.join(lang_path, "LC_MESSAGES", "nvda.mo")
              if not os.path.exists(mo_path):
                  print(f"  ⚠ Sin .mo para {lang}, omitiendo manifest.ini")
                  continue
              try:
                  with open(mo_path, "rb") as f:
                      _ = gettext.GNUTranslations(f).gettext
                  vars = {}
                  for var in ("addon_summary", "addon_description", "addon_changelog"):
                      vars[var] = _(addon_info[var])
                  manifest = tpl.format(**vars)
                  dest = os.path.join(lang_path, "manifest.ini")
                  with codecs.open(dest, "w", "utf-8") as f:
                      f.write(manifest)
                  generados += 1
                  print(f"  ✓ {lang}/manifest.ini")
              except Exception as e:
                  errores += 1
                  print(f"  ✗ {lang}: {e}")

          print(f"\nManifest traducidos: {generados} generados, {errores} errores")
          PYEOF

      - name: Generar HTML desde Markdown
        if: env.INCLUIR_DOCUMENTACION == 'true' && env.GENERAR_HTML == 'true'
        run: |
          python3 << 'PYEOF'
          import gettext, os, sys, types, shutil
          import markdown

          # ── Mock de SCons para poder importar buildVars.py ──
          for mod in ['SCons', 'SCons.Script', 'SCons.Node', 'SCons.Node.FS']:
              sys.modules[mod] = types.ModuleType(mod)
          m = sys.modules['SCons.Script']
          for attr in ['EnsurePythonVersion','Variables','BoolVariable','Environment','Copy','Builder']:
              setattr(m, attr, lambda *a, **kw: None)

          sys.path.insert(0, '.')
          import buildVars

          addon_info = buildVars.addon_info
          md_extensions = getattr(buildVars, 'markdownExtensions', [])
          base_lang = getattr(buildVars, 'baseLanguage', 'en')
          doc_dir = "addon/doc"

          # ── Copiar style.css a addon/doc/ ──
          if os.path.exists("style.css"):
              os.makedirs(doc_dir, exist_ok=True)
              shutil.copy2("style.css", os.path.join(doc_dir, "style.css"))
              print("✓ style.css copiado a addon/doc/")

          # ── Copiar readme.md raíz a addon/doc/{baseLanguage}/ ──
          if os.path.exists("readme.md"):
              dest_dir = os.path.join(doc_dir, base_lang)
              os.makedirs(dest_dir, exist_ok=True)
              shutil.copy2("readme.md", os.path.join(dest_dir, "readme.md"))
              print(f"✓ readme.md copiado a addon/doc/{base_lang}/")

          if not os.path.isdir(doc_dir):
              print("No existe addon/doc/, omitiendo HTML")
              sys.exit(0)

          # ── Mapear .mo por idioma para títulos traducidos ──
          mo_por_idioma = {}
          locale_dir = "addon/locale"
          if os.path.isdir(locale_dir):
              for lang in os.listdir(locale_dir):
                  mo = os.path.join(locale_dir, lang, "LC_MESSAGES", "nvda.mo")
                  if os.path.exists(mo):
                      mo_por_idioma[lang] = mo

          header_dic = {
              '[[!meta title="': "# ",
              '"]]': " #",
          }

          generados = 0
          for lang_dir in sorted(os.listdir(doc_dir)):
              lang_path = os.path.join(doc_dir, lang_dir)
              if not os.path.isdir(lang_path):
                  continue
              for fname in sorted(os.listdir(lang_path)):
                  if not fname.endswith(".md"):
                      continue

                  md_path = os.path.join(lang_path, fname)
                  html_path = os.path.join(lang_path, fname.rsplit(".", 1)[0] + ".html")

                  # Título traducido
                  mo_path = mo_por_idioma.get(lang_dir)
                  try:
                      if mo_path:
                          with open(mo_path, "rb") as f:
                              _ = gettext.GNUTranslations(f).gettext
                          summary = _(addon_info["addon_summary"])
                      else:
                          summary = addon_info["addon_summary"]
                  except Exception:
                      summary = addon_info["addon_summary"]

                  version = addon_info["addon_version"]
                  title = f"{summary} {version}"
                  lang_html = lang_dir.replace("_", "-")

                  with open(md_path, "r", encoding="utf-8") as f:
                      md_text = f.read()
                  for k, v in header_dic.items():
                      md_text = md_text.replace(k, v, 1)

                  html_text = markdown.markdown(md_text, extensions=md_extensions)
                  doc_text = "\n".join((
                      "<!DOCTYPE html>",
                      f'<html lang="{lang_html}">',
                      "<head>",
                      '<meta charset="UTF-8">',
                      '<meta name="viewport" content="width=device-width, initial-scale=1.0">',
                      '<link rel="stylesheet" type="text/css" href="../style.css" media="screen">',
                      f"<title>{title}</title>",
                      "</head>\n<body>",
                      html_text,
                      "</body>\n</html>",
                  ))
                  with open(html_path, "w", encoding="utf-8") as f:
                      f.write(doc_text)
                  generados += 1
                  print(f"  ✓ {lang_dir}/{fname} → .html")

          print(f"\nHTML generados: {generados}")
          PYEOF

      - name: Generar metadatos del paquete
        id: meta
        run: |
          python3 << 'PYEOF'
          import hashlib, json, os
          from datetime import datetime, timezone

          hashes = []
          idiomas_locale = set()
          idiomas_doc = set()

          # Hash de archivos de idiomas (.mo + .po + manifest.ini)
          if "${{ env.INCLUIR_IDIOMAS }}" == "true":
              for raiz, dirs, archivos in os.walk("addon/locale"):
                  for f in sorted(archivos):
                      if f.endswith((".mo", ".po", ".ini")):
                          ruta = os.path.join(raiz, f)
                          h = hashlib.sha256(open(ruta, "rb").read()).hexdigest()
                          rel = os.path.relpath(ruta, "addon/locale").replace(os.sep, "/")
                          hashes.append(f"{h}  locale/{rel}")
                          idiomas_locale.add(rel.split("/")[0])

          # Hash de archivos de documentación
          exts = tuple("${{ env.EXTENSIONES_DOC }}".split())
          if "${{ env.INCLUIR_DOCUMENTACION }}" == "true":
              for raiz, dirs, archivos in os.walk("addon/doc"):
                  for f in sorted(archivos):
                      if f.endswith(exts):
                          ruta = os.path.join(raiz, f)
                          h = hashlib.sha256(open(ruta, "rb").read()).hexdigest()
                          rel = os.path.relpath(ruta, "addon/doc").replace(os.sep, "/")
                          hashes.append(f"{h}  doc/{rel}")
                          idiomas_doc.add(rel.split("/")[0])

          contenido = "\n".join(sorted(hashes))
          hash_combinado = hashlib.sha256(contenido.encode()).hexdigest()

          info = {
              "hash_combinado": hash_combinado,
              "fecha": datetime.now(timezone.utc).isoformat(),
              "complemento": "${{ env.NOMBRE_COMPLEMENTO }}",
              "idiomas_locale": sorted(idiomas_locale),
              "idiomas_doc": sorted(idiomas_doc),
          }

          os.makedirs("addon", exist_ok=True)
          with open("addon/recursos_info.json", "w", encoding="utf-8") as f:
              json.dump(info, f, ensure_ascii=False, indent="\t")

          print(f"Hash combinado: {hash_combinado}")
          print(f"Idiomas (locale): {sorted(idiomas_locale)}")
          print(f"Idiomas (doc): {sorted(idiomas_doc)}")

          # Exportar para otros steps
          with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
              gh.write(f"hash={hash_combinado}\n")
              gh.write(f"fecha={datetime.now(timezone.utc).strftime('%d/%m/%Y %H:%M UTC')}\n")
          PYEOF

      - name: Crear paquete de recursos
        run: |
          mkdir -p _paquete

          # Incluir idiomas: .mo + .po + manifest.ini por idioma
          if [ "${{ env.INCLUIR_IDIOMAS }}" = "true" ]; then
            echo "Incluyendo idiomas..."
            if [ -d "addon/locale" ]; then
              mkdir -p _paquete/locale
              cd addon/locale
              find . -type f \( -name "*.mo" -o -name "*.po" -o -name "manifest.ini" \) | while read f; do
                mkdir -p "../../_paquete/locale/$(dirname "$f")"
                cp "$f" "../../_paquete/locale/$f"
              done
              cd ../..
            fi
          fi

          # Incluir documentación
          if [ "${{ env.INCLUIR_DOCUMENTACION }}" = "true" ]; then
            echo "Incluyendo documentación..."
            if [ -d "addon/doc" ]; then
              mkdir -p _paquete/doc
              cd addon/doc
              EXTS="${{ env.EXTENSIONES_DOC }}"
              FIND_ARGS=""
              FIRST=true
              for ext in $EXTS; do
                if [ "$FIRST" = true ]; then
                  FIND_ARGS="-name \"*${ext}\""
                  FIRST=false
                else
                  FIND_ARGS="$FIND_ARGS -o -name \"*${ext}\""
                fi
              done
              eval "find . -type f \( $FIND_ARGS \)" | while read f; do
                mkdir -p "../../_paquete/doc/$(dirname "$f")"
                cp "$f" "../../_paquete/doc/$f"
              done
              cd ../..
            fi
          fi

          # Incluir metadatos
          cp addon/recursos_info.json _paquete/

          # Crear ZIP
          cd _paquete
          zip -r "../${{ env.NOMBRE_COMPLEMENTO }}_recursos.zip" .
          cd ..
          echo "Paquete creado:"
          ls -lh "${{ env.NOMBRE_COMPLEMENTO }}_recursos.zip"

      - name: Publicar paquete de recursos
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_RELEASE }}
          name: "🌐 Recursos - ${{ steps.meta.outputs.fecha }}"
          body: |
            ## Actualización automática de recursos

            **Complemento:** `${{ env.NOMBRE_COMPLEMENTO }}`
            **Fecha:** ${{ steps.meta.outputs.fecha }}
            **Hash:** `${{ steps.meta.outputs.hash }}`

            Este paquete contiene traducciones y/o documentación actualizada.
            El complemento lo descarga automáticamente.

            > ⚠️ Esta release es solo para recursos de idioma/documentación.
          files: |
            ${{ env.NOMBRE_COMPLEMENTO }}_recursos.zip
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir archivos compilados al repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add addon/locale/**/*.mo addon/locale/*/manifest.ini addon/doc/**/*.html addon/doc/style.css addon/recursos_info.json || true

          if git diff --staged --quiet; then
            echo "Sin cambios en archivos compilados"
          else
            git commit -m "🌐 Recursos compilados automáticamente [skip ci]"
            git push
          fi
